    <script>
        const essayContent = [
            { 
                id: 'p1', step: '第一段（起）：提出觀點', title: '📱 背景與立場', goal: '引出畢旅帶手機的爭議，並明確表達自律前提下的「贊成」立場。',
                text: '　　期待已久的畢業旅行即將到來，班上同學們都<span class="essay-highlight">興奮不已</span>。然而，每當討論到行程細節時，「手機該不該帶」總會成為大家爭論不休的話題。有人認為帶手機容易分心且容易遺失，但也有人認為這是記錄回憶與聯繫家人的好工具。我主張：<span class="essay-highlight">在有自律能力的前提下，我們應該被允許攜帶手機參加畢業旅行</span>。這不僅是對我們的信任，更是學習自我管理的大好契機。',
                sentence: '<strong>【選擇句型】與其……不如……</strong><br>與其全面禁止帶手機，不如教導我們如何正確且自律地使用它。',

                    { word: '雙面刃', desc: '比喻事物具有正反兩面的影響。' }

                rhetoric: '<strong>【設問】</strong> 畢業旅行帶手機，真的只會讓人變成「低頭族」嗎？那可不一定！',
                quotes: [
                    '「科技是最好的工具，卻是最壞的主人。」',

                sentence: '<strong>【遞進句型】不僅能……更能……</strong><br>帶手機不僅能隨時向父母報平安，更能記錄下同學間珍貴的笑容。',
                idioms: [

                    '「回憶是生活中唯一的沙漏，而照片是留住沙漏的寶藏。」',

                    '「家人的牽掛是世上最溫馨的守護。」'

                tip: '舉例要具體：不要只寫抽象的「拍照很方便」，試著描寫「記錄同學燦爛笑臉」或「向家人報平安讓媽媽放心」這種有溫度的場景，能讓論證更生動。',
                chartLabel: '班級畢旅帶手機主要用途調查',
                chartData: [45, 35, 15, 5], // 拍照記錄, 安全聯絡, 同儕分享, 其他
                chartType: 'bar'
            },
            { 
                id: 'p3', step: '第三段（轉）：隱憂與對策', title: '⚖️ 擔憂與公約', goal: '主動提出反方隱憂（沈迷、遺失），並提出「班級自律公約」作為具體對策。',
                text: '　　當然，我也明白老師和家長的擔憂，害怕大家因沉迷遊戲而<span class="essay-highlight">玩物喪志</span>，或在活動中丟三落四、遺失貴重物品。為了不讓師長操心，我們應該建立自律態度。在旅行中，我們要把心思放在大自然與群體活動中，用心去「身歷其境」，而不是整天盯著螢幕。只要做到「行進間不滑手機、睡前不打遊戲、活動中妥善保管」，規矩就不是禁錮，而是保護我們的「金鐘罩」。',

                chartLabel: '自律公約遵守信心度調查',
                chartData: [90, 85, 95], // 拍照不玩遊戲, 行進不看手機, 妥善保管貴重物品
                chartType: 'radar'

                text: '　　「水能載舟，亦能覆舟」，手機本身沒有好壞，關鍵在於我們使用者的態度。真正的自由來自於自律，與其讓師長全面禁止，不如讓我們藉由這次畢業旅行，證明自己已經長大，有能力妥善管理手機。只要我們遵守規範，做科技的主人，相信我們一定能帶著滿滿的珍貴回憶與平安，微笑回家！',

        let chartInstance = null;

        function renderChart(data) {
            const ctx = document.getElementById('discipineChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            let config = {};

            if (data.chartType === 'pie') {
                config = {
                    type: 'pie',
                    data: {
                        labels: ['支持攜帶並自律 (75%)', '反對攜帶 (15%)', '無意見 (10%)'],
                        datasets: [{
                            data: data.chartData,
                            backgroundColor: ['#0284C7', '#F59E0B', '#94A3B8']
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { 
                            title: { 
                                display: true, 
                                text: data.chartLabel, 
                                font: { size: 15, family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                                color: '#0F172A'
                            } 
                        }
                    }
                };
            } else if (data.chartType === 'bar') {
                config = {
                    type: 'bar',
                    data: {
                        labels: ['拍照與記錄', '聯絡家人', '與同學分享', '其他用途'],
                        datasets: [{
                            label: '百分比 (%)',
                            data: data.chartData,
                            backgroundColor: '#3B82F6',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { 
                            title: { 
                                display: true, 
                                text: data.chartLabel, 
                                font: { size: 15, family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                                color: '#0F172A'
                            }, 
                            legend: { display: false } 
                        },
                        scales: {
                            y: { beginAtZero: true, max: 50 }
                        }
                    }
                };
            } else if (data.chartType === 'radar') {
                config = {
                    type: 'radar',
                    data: {
                        labels: ['遵守拍照規範', '行進不看手機', '妥善保管手機'],
                        datasets: [{
                            label: '班級信心指數 (滿分100)',
                            data: data.chartData,
                            backgroundColor: 'rgba(16, 185, 129, 0.2)',
                            borderColor: '#10B981',
                            pointBackgroundColor: '#10B981',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        scales: { r: { suggestedMin: 0, suggestedMax: 100 } },
                        plugins: { 
                            title: { 
                                display: true, 
                                text: data.chartLabel, 
                                font: { size: 15, family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                                color: '#0F172A'
                            } 
                        }
                    }
                };
            } else if (data.chartType === 'doughnut') {
                config = {
                    type: 'doughnut',
                    data: {
                        labels: ['收穫美好回憶 (50%)', '鍛鍊自律管理 (30%)', '安全抵家 (20%)'],
                        datasets: [{
                            data: data.chartData,
                            backgroundColor: ['#10B981', '#3B82F6', '#EF4444']
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { 
                            title: { 
                                display: true, 
                                text: data.chartLabel, 
                                font: { size: 15, family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                                color: '#0F172A'
                            } 
                        }
                    }
                };
            }

            chartInstance = new Chart(ctx, config);
        }

        function updateToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        function render(id) {
            const data = essayContent.find(p => p.id === id);
            
            document.getElementById('section-step').textContent = data.step;
            document.getElementById('section-title').textContent = data.title;
            document.getElementById('section-goal').textContent = `🎯 探究目標：${data.goal}`;
            document.getElementById('narrative-text').innerHTML = data.text;
            
            // 素材同步
            document.getElementById('box-sentence').innerHTML = data.sentence;
            
            // 成語列表格式化渲染
            const idiomsHtml = data.idioms.map(i => `
                <div class="bg-amber-100/50 p-2.5 rounded-lg border border-amber-200/50 mb-1">
                    <span class="font-bold text-amber-900 block">✨ ${i.word}</span>
                    <span class="text-xs text-amber-800/80 block mt-0.5">${i.desc}</span>
                </div>
            `).join('');
            document.getElementById('box-idioms').innerHTML = idiomsHtml;
            
            document.getElementById('box-rhetoric').innerHTML = data.rhetoric;
            
            // 佳句格式化渲染
            const quotesHtml = data.quotes.map(q => `
                <div class="flex items-start gap-1.5 py-1">
                    <span class="text-emerald-500 mt-1">✦</span>
                    <p class="text-emerald-950 font-medium">${q}</p>
                </div>
            `).join('');
            document.getElementById('box-quotes').innerHTML = quotesHtml;
            
            document.getElementById('tip-text').textContent = data.tip;

            renderChart(data);
        }

        function init() {
            const nav = document.getElementById('nav-tabs');
            const icons = { p1: '💡', p2: '📷', p3: '⚖️', p4: '🏆' };

            essayContent.forEach(p => {
                const btn = document.createElement('a');
                btn.href = "#";
                btn.className = "nav-link py-3.5 px-4 text-slate-700 rounded-xl hover:bg-sky-50/60 flex items-center mb-1 text-sm md:text-base border-l-4";
                btn.setAttribute('data-target', p.id);
                btn.innerHTML = `<span class="mr-3 text-lg">${icons[p.id]}</span> ${p.title}`;
                btn.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    btn.classList.add('active');
                    render(p.id);
                    updateToast(`已載入站點：${p.title}`);
                };
                nav.appendChild(btn);
            });
            
            const firstTab = nav.querySelector('.nav-link');
            if (firstTab) {
                firstTab.click();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
