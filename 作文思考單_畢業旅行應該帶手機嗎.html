<body class="text-gray-800 min-h-screen pb-12">

                    </nav>
                </div>
            </div>

            <!-- 右側：內容展示與工具箱 -->
            <div class="lg:col-span-3">
                <main id="content-display" class="bg-white p-6 md:p-10 rounded-3xl shadow-xl border-t-8 border-teal-500">

                        <div class="step-tag" id="section-step"></div>

    </div>

    <script>
        const essayContent = [
            { 
                id: 'p1', step: '第一段（起）：提出觀點', title: '📱 背景與立場', goal: '引出畢旅帶手機的爭議，並明確表達自律前提下的「贊成」立場。',
                text: '　　期待已久的畢業旅行即將到來，班上同學們都興奮不已。然而，每當討論到行程細節時，「手機該不該帶」總會成為大家爭論不休的話題。有人認為帶手機容易分心且容易遺失，但也有人認為這是記錄回憶與聯繫家人的好工具。我主張：<span class="essay-highlight">在有自律能力的前提下，我們應該被允許攜帶手機參加畢業旅行</span>。這不僅是對我們的信任，更是學習自我管理的大好契機。',
                sentence: '「與其……不如……」<br>與其全面禁止帶手機，不如教導我們如何正確且自律地使用它。',
                idioms: '<strong>【利弊互見】</strong> 利與弊同時呈現。<br><strong>【水能載舟，亦能覆舟】</strong> 手機是很好的工具，但也可能帶來反效果。<br><strong>【雙面刃】</strong> 比喻事物具有正反兩面的影響。<br><strong>【眾說紛紜】</strong> 各人有各人的看法，議論紛紛。<br><strong>【各執一詞】</strong> 各人都堅持自己的意見，爭論不休。<br><strong>【一體兩面】</strong> 比喻一件事物同時具有正反兩面的特質。',
                rhetoric: '<strong>【設問】</strong> 畢業旅行帶手機，真的只會讓人變成「低頭族」嗎？那可不一定！',
                quotes: '「科技是最好的工具，卻是最壞的主人。」<br>「討論是智慧的磨刀石，真理越辯越明。」<br>「工具本身沒有善惡，它的價值完全取決於使用它的人。」<br>「最美的風景不在小小的螢幕裡，而是在我們歡樂的畢旅活動中。」',
                tip: '開門見山法：先描寫班上對畢旅的興奮，接著引引出手機議題的爭論，最後在第一段結尾清晰點出自己的「贊成立場」。',
                chartLabel: '班級畢旅帶手機意向調查',
                chartData: [75, 15, 10], // 贊成帶但自律, 反對帶, 無意見
                chartType: 'pie',
                question: '你個人的立場是？你覺得在什麼情況下「贊成」帶手機？',
                placeholder: '例如：我贊成帶手機，因為我們已經五年級了，應該學習自律使用...'
            },
            { 
                id: 'p2', step: '第二段（承）：正面論據', title: '📷 安全與記錄', goal: '提出正面論據（隨時聯絡向家人報平安、隨手拍下珍貴回憶）。',
                text: '　　首先，帶手機最大的好處是「安全」與「記錄」。出門在外，父母難免會牽掛，有了手機，我們就能在抵達飯店或休息時，打通電話或傳個訊息向家人報平安，避免家長牽腸掛肚。此外，畢業旅行是小學階段最珍貴的回憶，手機就像一台輕便的「時光機」，能讓我們隨時拍下美麗的風景，以及同學們燦爛的笑臉，將這些<span class="essay-highlight">身歷其境</span>的難忘瞬間永遠保存下來。',
                sentence: '「不僅能……更能……」<br>帶手機不僅能隨時向父母報平安，更能記錄下同學間珍貴的笑容。',
                idioms: '<strong>【身歷其境】</strong> 親自到了那個境地。<br><strong>【一舉兩得】</strong> 做一件事同時得到兩方面的好處。<br><strong>【刻骨銘心】</strong> 形容記憶極深，終身難忘。<br><strong>【天涯若比鄰】</strong> 比喻雖然相隔遙遠，卻像近鄰一樣親近。<br><strong>【定心丸】</strong> 比喻能起安定人心作用的人或物。<br><strong>【歷歷在目】</strong> 清清楚楚地呈現在眼前。',
                rhetoric: '<strong>【譬喻】</strong> 手機是替我們捕捉青春回憶的「時光機」。',
                quotes: '「回憶是生活中唯一的沙漏，而照片是留住沙漏的寶藏。」<br>「照片，是凍結時間、捕捉溫暖的魔法。」<br>「兒行千里母擔憂，家人的牽掛是世上最溫馨的守護。」<br>「科技的偉大，不在於它有多新穎，而在於它拉近了人與人之間的關懷。」',
                tip: '舉例要具體：不要只寫「拍照很方便」，要描寫「記錄同學燦爛笑臉」這種有溫度的情境，能讓論證更生動。',
                chartLabel: '班級畢旅帶手機主要用途調查',
                chartData: [45, 35, 15, 5], // 拍照記錄, 安全聯絡, 同儕分享, 其他
                chartType: 'bar',
                question: '請寫出兩項你認為帶手機最大的「好處」或「用途」：',
                placeholder: '例如：1. 可以隨時跟爸爸媽媽保持聯絡。2. 可以拍照留下跟同學的好回憶。'
            },
            { 
                id: 'p3', step: '第三段（轉）：隱憂與對策', title: '⚖️ 擔憂與公約', goal: '主動提出反方隱憂（沈迷、遺失），並提出「班級自律公約」作為具體對策。',
                text: '　　當然，我也明白老師 and 家長的擔憂，害怕大家因沉迷遊戲而<span class="essay-highlight">玩物喪志</span>，或在活動中丟三落四、遺失貴重物品。為了不讓師長操心，我們應該建立自律態度。在旅行中，我們要把心思放在大自然與群體活動中，用心去「身歷其境」，而不是整天盯著螢幕。只要做到「行進間不滑手機、睡前不打遊戲、活動中妥善保管」，規矩就不是禁錮，而是保護我們的「金鐘罩」。',
                sentence: '「雖然……但是……」<br>雖然帶手機可能會讓我們分心，但是只要訂定明確的公約，就能發揮它的最大優點。',
                idioms: '<strong>【本末倒置】</strong> 指旅遊只顧玩手機，忽略了身邊的風景。<br><strong>【玩物喪志】</strong> 沉迷手機遊戲而失去了探索與學習的志向。<br><strong>【心不在焉】</strong> 心思不在旅行的活動上。<br><strong>【防微杜漸】</strong> 在錯誤剛露頭時就加以防範。<br><strong>【因噎廢食】</strong> 比喻因為出了點小毛病就完全放棄。<br><strong>【言出必行】</strong> 說了就一定要做到。',
                rhetoric: '<strong>【譬喻】</strong> 手機是替我們捕捉青春回憶的「時光機」，而不是困住我們雙眼的「牢籠」。',
                quotes: '「規矩不是禁錮，而是金鐘罩，為了保護我們能安全、充實地享受旅程。」<br>「自律不是自我禁錮，而是為了更自在地飛翔。」<br>「規矩是前行的護欄，而非前行的絆腳石。」<br>「真正的成長，是學會不讓外界的喧囂困住雙眼與心靈。」',
                tip: '以退為進法：先承認反方的擔心是合理的，再主動提出合理的解決方案（如自律公約）。這樣能顯得你非常理智且成熟。',
                chartLabel: '自律公約遵守信心度調查',
                chartData: [90, 85, 95], // 拍照不玩遊戲, 行進不看手機, 妥善保管貴重物品
                chartType: 'radar',
                question: '為了讓老師與家長放心，你可以提出哪兩項「自律公約」？',
                placeholder: '例如：1. 用餐和走路時絕對不看手機。2. 手機只用來拍照，不下載 any 遊戲。'
            },
            { 
                id: 'p4', step: '第四段（合）：結論觀點', title: '🏆結論', goal: '總結全文，呼籲「自律」才是關鍵，期許大家做科技的主人。',
                text: '　　「水能載舟，亦能覆舟」，手機本身沒有好壞，關鍵在於我們使用者的態度。真正的自由來自於自律，與其讓師長全面禁止，不如讓我們藉由這次畢業旅行，證明自己已經長大，有能力妥善管理手機。只要我們遵守規範，做科技的主人，相信我們一定能帶著滿滿的珍貴回憶與平安，微笑回家！',
                sentence: '「與其……不如……」結合「不僅能……更能……」<br>與其被動受禁，不如讓我們藉此機會學習自我管理，不僅能保障旅途安全，更能向世界證明我們的成長。',
                idioms: '<strong>【言出必行】</strong> 說到做到，信用極佳。<br><strong>【自律自重】</strong> 能自我約束，並尊重自己。<br><strong>【身歷其境】</strong> 感受畢旅的人事物而非手機螢幕。<br><strong>【言行一致】</strong> 說的和做的一樣，遵守手機使用諾言。<br><strong>【防患未然】</strong> 在禍患發生前就加以防備。<br><strong>【滿載而歸】</strong> 比喻收穫豐富（帶著滿滿的回憶平安回家）。',
                rhetoric: '無特別指定修辭，建議使用譬喻或呼應。',
                quotes: '「真正的自由，來自於高度的自律。」<br>「做科技的主人，而非科技的奴隸。」<br>「最棒的旅行，是帶著滿滿的安全感出發，裝滿美麗的回憶回家。」<br>「真正的長大，是向世界證明：我們有能力妥善管理自己的自由。」',
                tip: '首尾呼應：最後再次強調「自律」的重要性。可以引用「水能載舟，亦能覆舟」等金句，讓結論強而有力、引人深思。',
                chartLabel: '畢旅收穫預期分析',
                chartData: [50, 30, 20], // 友誼與美好回憶, 自自我管理能力, 安全返家信心
                chartType: 'doughnut',
                question: '最後，請用一句話寫下你對自己或班上同學在這次畢旅的「自律期許」：',
                placeholder: '例如：希望大家都能言出必行，做手機的主人，平平安安出門，開開心心回家！'
            }
        ];

        let chartInstance = null;

        function renderChart(data) {
            const ctx = document.getElementById('discipineChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            let config = {};

            if (data.chartType === 'pie') {
                config = {
                    type: 'pie',
                    data: {
                        labels: ['支持攜帶並自律 (75%)', '反對攜帶 (15%)', '無意見 (10%)'],
                        datasets: [{
                            data: data.chartData,
                            backgroundColor: ['#0D9488', '#F59E0B', '#94A3B8']
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { title: { display: true, text: data.chartLabel, font: { size: 14, family: "'Noto Sans TC', sans-serif" } } }
                    }
                };
            } else if (data.chartType === 'bar') {
                config = {
                    type: 'bar',
                    data: {
                        labels: ['拍照與記錄', '聯絡家人', '與同學分享', '其他用途'],
                        datasets: [{
                            label: '百分比 (%)',
                            data: data.chartData,
                            backgroundColor: '#3B82F6',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { title: { display: true, text: data.chartLabel, font: { size: 14, family: "'Noto Sans TC', sans-serif" } }, legend: { display: false } }
                    }
                };
            } else if (data.chartType === 'radar') {
                config = {
                    type: 'radar',
                    data: {
                        labels: ['遵守拍照規範', '行進不看手機', '妥善保管手機'],
                        datasets: [{
                            label: '班級信心指數 (滿分100)',
                            data: data.chartData,
                            backgroundColor: 'rgba(16, 185, 129, 0.2)',
                            borderColor: '#10B981',
                            pointBackgroundColor: '#10B981'
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        scales: { r: { suggestedMin: 0, suggestedMax: 100 } },
                        plugins: { title: { display: true, text: data.chartLabel, font: { size: 14, family: "'Noto Sans TC', sans-serif" } } }
                    }
                };
            } else if (data.chartType === 'doughnut') {
                config = {
                    type: 'doughnut',
                    data: {
                        labels: ['收穫美好回憶 (50%)', '鍛鍊自律管理 (30%)', '安全抵家 (20%)'],
                        datasets: [{
                            data: data.chartData,
                            backgroundColor: ['#10B981', '#3B82F6', '#EF4444']
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { title: { display: true, text: data.chartLabel, font: { size: 14, family: "'Noto Sans TC', sans-serif" } } }
                    }
                };
            }

            chartInstance = new Chart(ctx, config);
        }

        function render(id) {
            const data = essayContent.find(p => p.id === id);
            
            document.getElementById('section-step').textContent = data.step;
            document.getElementById('section-title').textContent = data.title;
            document.getElementById('section-goal').textContent = `🎯 探究目標：${data.goal}`;
            document.getElementById('narrative-text').innerHTML = data.text;
            
            // 素材同步
            document.getElementById('box-sentence').innerHTML = data.sentence;
            document.getElementById('box-idioms').innerHTML = Array.isArray(data.idioms) ? data.idioms.map(i => `<span class="font-bold text-red-600">${i}</span>`).join('、') : data.idioms;
            document.getElementById('box-rhetoric').innerHTML = data.rhetoric || '無特別指定修辭，建議使用設問與排比。';
            document.getElementById('box-quotes').innerHTML = Array.isArray(data.quotes) ? data.quotes.map(q => `「${q}」`).join('<br>') : `「${data.quotes}」`;
            
            document.getElementById('tip-text').textContent = data.tip;

            renderChart(data);
        }

        function init() {
            const nav = document.getElementById('nav-tabs');
            const icons = { p1: '💡', p2: '📷', p3: '⚖️', p4: '🏆' };

            essayContent.forEach(p => {
                const btn = document.createElement('a');
                btn.href = "#";
                btn.className = "nav-link py-3 px-4 text-slate-700 rounded-xl hover:bg-teal-50 flex items-center mb-1";
                btn.setAttribute('data-target', p.id);
                btn.innerHTML = `<span class="mr-2">${icons[p.id]}</span> ${p.title}`;
                btn.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    btn.classList.add('active');
                    render(p.id);
                };
                nav.appendChild(btn);
            });
            
            const firstTab = nav.querySelector('.nav-link');
            if (firstTab) {
                firstTab.click();
            }
        }
        window.onload = init;
    </script>
</body>
</html>
